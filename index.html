<!DOCTYPE html>
<html>
<head>
  <title>My Catering</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- HERO -->
  <header class="hero">
    <img src="images/header.png" alt="My Catering Banner">
  </header>

  <!-- MENU -->
  <section class="menu">
    <div class="card">Rendang</div>
    <div class="card">Perkedel</div>
    <div class="card">Acar</div>
  </section>

  <!-- PRICING -->
  <section class="pricing">
    <h2>Pricing</h2>
    <div class="price-columns">
      <div>Paket A</div>
      <div>Paket B</div>
      <div>Paket C</div>
    </div>
  </section>

  <!-- CONTACT -->
  <section class="contact">
    <a href="mailto:yourname@gmail.com" class="button">
      Order via Email
    </a>
  </section>

</body>
</html>
