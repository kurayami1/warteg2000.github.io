<!DOCTYPE html>
<html>
<head>
  <title>My Catering</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- HERO -->
  <header class="hero">
    <img src="images/header.jpg" alt="My Catering Banner">
  </header>

  <!-- MENU -->
  <section class="menu">
    <div class="card">Menu 1</div>
    <div class="card">Menu 2</div>
    <div class="card">Menu 3</div>
  </section>

  <!-- PRICING -->
  <section class="pricing">
    <h2>Pricing</h2>
    <div class="price-columns">
      <div>Package A</div>
      <div>Package B</div>
      <div>Package C</div>
    </div>
  </section>

  <!-- CONTACT -->
  <section class="contact">
    <a href="mailto:yourname@gmail.com" class="button">
      Order via Email
    </a>
  </section>

</body>
</html>
